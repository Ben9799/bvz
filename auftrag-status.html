<style>
:root {
  --bg:       #09090b;
  --surface:  #111113;
  --surface2: #18181b;
  --surface3: #1c1c1f;
  --border:   #27272a;
  --border2:  #3f3f46;
  --accent:   #00d4ff;
  --accent2:  #00b8d4;
  --ok:       #4ade80;
  --warn:     #fb923c;
  --danger:   #f87171;
  --text:     #fafafa;
  --text2:    #a1a1aa;
  --text3:    #52525b;
  --font:     'Space Grotesk', sans-serif;
  --mono:     'JetBrains Mono', monospace;
  --radius:   10px;
  --radius-lg:16px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:var(--font);font-size:14px;min-height:100vh;-webkit-font-smoothing:antialiased;
  background-image:radial-gradient(ellipse 80% 50% at 50% -10%,rgba(0,212,255,.07),transparent 60%)}

/* WRAPPER */
.page-wrap{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;padding:32px 16px 48px}

/* PORTAL CARD */
.portal-card{background:var(--surface);border:1px solid var(--border);border-radius:24px;overflow:hidden;
  box-shadow:0 2px 4px rgba(0,0,0,.5),0 20px 60px rgba(0,0,0,.4);width:100%;max-width:680px}

/* HEADER */
.portal-header{position:relative;overflow:hidden;padding:28px 32px 22px;
  background:linear-gradient(160deg,#0e0e10 0%,#111113 60%,#0d0d10 100%)}
.portal-header::before{content:'';position:absolute;inset:0;
  background:radial-gradient(ellipse 60% 50% at 80% -5%,rgba(0,212,255,.07) 0%,transparent 60%);pointer-events:none}
.laser-line{position:absolute;top:0;left:-100%;width:200%;height:2px;
  background:linear-gradient(90deg,transparent 0%,rgba(0,212,255,.6) 40%,rgba(0,212,255,1) 50%,rgba(0,212,255,.6) 60%,transparent 100%);
  animation:laserSweep 4s ease-in-out infinite;pointer-events:none}
@keyframes laserSweep{0%{transform:translateX(-60%) scaleX(.6);opacity:0}20%{opacity:1}50%{transform:translateX(0) scaleX(1)}80%{opacity:1}100%{transform:translateX(60%) scaleX(.6);opacity:0}}

.header-logo{display:flex;align-items:center;gap:14px;margin-bottom:6px}
.header-icon{width:44px;height:44px;background:linear-gradient(135deg,#00d4ff,#0ea5e9);border-radius:12px;
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
  box-shadow:0 0 0 1px rgba(0,212,255,.3),0 0 20px rgba(0,212,255,.15)}
.header-icon img{width:28px;height:28px;object-fit:contain}
.brand{font-size:20px;font-weight:800;letter-spacing:-.4px;line-height:1.1}
.brand em{color:var(--accent);font-style:normal}
.brand-sub{font-size:12px;color:var(--text3);margin-top:3px;font-weight:400}

.trust-row{display:flex;gap:6px;flex-wrap:wrap;margin-top:14px}
.trust-badge{display:flex;align-items:center;gap:5px;padding:4px 10px;border-radius:20px;
  background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.07);
  font-size:11px;color:var(--text2);font-weight:500}
.trust-badge strong{color:var(--text)}

/* SEARCH */
.search-wrap{padding:22px 32px;border-bottom:1px solid var(--border)}
.search-row{display:flex;gap:10px}
.search-input{flex:1;background:var(--surface2);border:1px solid var(--border);border-radius:9px;
  color:var(--text);font-family:var(--mono);font-size:13px;letter-spacing:1px;
  padding:10px 14px;outline:none;transition:border-color .15s}
.search-input:focus{border-color:rgba(0,212,255,.5);box-shadow:0 0 0 3px rgba(0,212,255,.06)}
.search-input::placeholder{color:var(--text3);letter-spacing:0}
.btn-search{background:var(--accent);color:#020617;border:none;border-radius:9px;
  font-family:var(--font);font-size:13px;font-weight:700;padding:10px 22px;
  cursor:pointer;transition:all .15s;white-space:nowrap;display:flex;align-items:center;gap:6px}
.btn-search:hover{background:#00b8d4;transform:translateY(-1px)}
.btn-search:disabled{background:var(--surface3);color:var(--text3);cursor:not-allowed;transform:none}
.search-hint{font-size:11px;color:var(--text3);margin-top:8px;line-height:1.5}

/* RESULT */
.result-wrap{padding:24px 32px 32px}

/* Status hero */
.status-hero{text-align:center;padding:4px 0 0}
.status-hero-id{font-family:var(--mono);font-size:11px;color:var(--text3);margin-bottom:8px;letter-spacing:3px;text-transform:uppercase}
.status-hero-name{font-size:22px;font-weight:800;letter-spacing:-.5px;margin-bottom:6px;line-height:1.2}
.status-hero-meta{font-size:13px;color:var(--text2);display:flex;justify-content:center;gap:14px;flex-wrap:wrap}
.status-hero-meta span{display:flex;align-items:center;gap:4px}

/* Live dot */
.live-dot{display:inline-flex;align-items:center;gap:5px;font-size:10px;font-weight:600;
  letter-spacing:.5px;text-transform:uppercase;color:var(--ok);
  background:rgba(74,222,128,.08);border:1px solid rgba(74,222,128,.18);
  padding:3px 9px;border-radius:20px;margin-bottom:14px}
.live-dot::before{content:'';width:6px;height:6px;border-radius:50%;background:var(--ok);animation:livePulse 2s ease infinite}
@keyframes livePulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(.7)}}

/* Progress ring */
.progress-ring-wrap{display:flex;justify-content:center;margin:4px 0 18px}
.progress-ring-bg{fill:none;stroke:var(--border);stroke-width:8}
.progress-ring-fill{fill:none;stroke-width:8;stroke-linecap:round;transition:stroke-dashoffset 1.2s cubic-bezier(.4,0,.2,1)}
.progress-ring-label{text-anchor:middle;dominant-baseline:middle;font-family:'Space Grotesk',sans-serif;font-weight:800}

/* Status mini cards */
.status-cards-row{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin:18px 0}
.sc-card{background:var(--surface2);border:1px solid var(--border);border-radius:14px;padding:14px;text-align:center}
.sc-val{font-family:var(--mono);font-size:24px;font-weight:800;letter-spacing:-1px;line-height:1}
.sc-label{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.8px;color:var(--text3);margin-top:5px}

/* ETA */
.eta-box{background:linear-gradient(135deg,rgba(0,212,255,.04),rgba(0,212,255,.02));
  border:1px solid rgba(0,212,255,.15);border-radius:14px;padding:16px 18px;margin:14px 0;
  display:flex;align-items:center;gap:14px}
.eta-icon{font-size:28px;flex-shrink:0}
.eta-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--accent2);margin-bottom:3px}
.eta-val{font-size:16px;font-weight:700;letter-spacing:-.2px}
.eta-sub{font-size:12px;color:var(--text2);margin-top:2px;line-height:1.5}

/* Timeline */
.status-timeline{margin-top:18px}
.stl-item{display:flex;gap:14px;padding:10px 0;position:relative}
.stl-item:not(:last-child)::after{content:'';position:absolute;left:15px;top:40px;bottom:-4px;width:2px;background:linear-gradient(var(--border),transparent)}
.stl-dot{width:32px;height:32px;border-radius:50%;border:2px solid var(--border);background:var(--surface);
  display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0;z-index:1;position:relative;transition:all .3s}
.stl-dot.active{border-color:var(--accent);background:rgba(0,212,255,.1);box-shadow:0 0 0 4px rgba(0,212,255,.08),0 0 16px rgba(0,212,255,.12)}
.stl-dot.done{border-color:var(--ok);background:rgba(74,222,128,.1)}
.stl-content{flex:1;padding-top:5px}
.stl-title{font-size:14px;font-weight:700;letter-spacing:-.2px}
.stl-sub{font-size:12px;color:var(--text3);margin-top:3px;line-height:1.5}
.stl-item.active .stl-title{color:var(--text)}
.stl-item.done .stl-title{color:var(--ok)}
.stl-item:not(.active):not(.done) .stl-title{color:var(--text3)}

/* MUSTER section — 1. Muster zur Freigabe */
.muster-block{margin:18px 0;padding:18px;background:linear-gradient(135deg,rgba(0,212,255,.05),rgba(0,212,255,.02));
  border:1.5px solid rgba(0,212,255,.25);border-radius:16px;position:relative;overflow:hidden}
.muster-block.approved{background:linear-gradient(135deg,rgba(74,222,128,.06),rgba(74,222,128,.02));border-color:rgba(74,222,128,.3)}
.muster-block.rework{background:linear-gradient(135deg,rgba(251,146,60,.05),rgba(251,146,60,.02));border-color:rgba(251,146,60,.3)}
.muster-title{display:flex;align-items:center;gap:8px;font-size:13px;font-weight:700;text-transform:uppercase;letter-spacing:1px;margin-bottom:10px}
.muster-title-pending{color:var(--accent)}
.muster-title-approved{color:var(--ok)}
.muster-title-rework{color:var(--warn)}
.muster-img-wrap{border-radius:12px;overflow:hidden;background:#000;margin-bottom:12px;border:1px solid var(--border);
  cursor:zoom-in;transition:transform .15s}
.muster-img-wrap:hover{transform:scale(1.005)}
.muster-img-wrap img{width:100%;height:auto;max-height:360px;object-fit:contain;display:block}
.muster-headline{font-size:17px;font-weight:700;letter-spacing:-.2px;margin-bottom:6px;line-height:1.3}
.muster-sub{font-size:13px;color:var(--text2);line-height:1.5;margin-bottom:14px}
.muster-actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:6px}
.btn-muster{flex:1;min-width:160px;padding:13px 16px;border-radius:10px;border:none;font-family:var(--font);
  font-size:14px;font-weight:700;cursor:pointer;transition:all .15s;display:flex;align-items:center;justify-content:center;gap:6px}
.btn-muster-approve{background:var(--ok);color:#022c14}
.btn-muster-approve:hover{background:#22c55e;transform:translateY(-1px);box-shadow:0 6px 20px rgba(74,222,128,.25)}
.btn-muster-rework{background:var(--surface3);color:var(--text);border:1px solid var(--border2)}
.btn-muster-rework:hover{background:rgba(251,146,60,.1);border-color:var(--warn);color:var(--warn)}
.muster-feedback-form{display:none;margin-top:10px}
.muster-feedback-form.active{display:block;animation:fbIn .25s ease}
@keyframes fbIn{from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:none}}
.muster-feedback-form textarea{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:9px;
  color:var(--text);font-family:var(--font);font-size:13px;padding:10px 12px;outline:none;resize:vertical;min-height:80px;transition:border-color .15s}
.muster-feedback-form textarea:focus{border-color:rgba(251,146,60,.4)}
.muster-fb-row{display:flex;gap:8px;margin-top:8px}
.muster-fb-row button{flex:1;padding:10px;border-radius:8px;font-family:var(--font);font-size:13px;font-weight:600;cursor:pointer;border:none;transition:all .15s}
.muster-fb-cancel{background:var(--surface3);color:var(--text2);border:1px solid var(--border)}
.muster-fb-cancel:hover{background:var(--surface)}
.muster-fb-send{background:var(--warn);color:#1a0c00}
.muster-fb-send:hover{background:#fb923c;transform:translateY(-1px)}
.muster-confirmed{padding:12px 14px;background:rgba(74,222,128,.06);border:1px solid rgba(74,222,128,.2);border-radius:10px;display:flex;gap:10px;align-items:flex-start}
.muster-confirmed-icon{font-size:22px;flex-shrink:0;line-height:1}
.muster-confirmed-text{font-size:13px;color:var(--text);line-height:1.5}
.muster-confirmed-text strong{display:block;color:var(--ok);margin-bottom:2px}
.muster-rework-info{padding:12px 14px;background:rgba(251,146,60,.06);border:1px solid rgba(251,146,60,.25);border-radius:10px}
.muster-rework-info-title{font-size:12px;font-weight:700;color:var(--warn);margin-bottom:4px;display:flex;align-items:center;gap:6px}
.muster-rework-note{font-size:13px;color:var(--text);background:var(--surface2);padding:10px 12px;border-radius:8px;margin-top:8px;border-left:3px solid var(--warn);line-height:1.5;font-style:italic}

/* Not found */
.not-found{color:var(--danger);text-align:center;padding:24px;
  border:1px solid rgba(248,113,113,.2);border-radius:14px;background:rgba(248,113,113,.04)}
.not-found-icon{font-size:28px;margin-bottom:10px}

/* Back button */
.btn-secondary{background:var(--surface2);color:var(--text);border:1px solid var(--border);
  border-radius:8px;font-family:var(--font);font-size:12px;font-weight:600;
  padding:7px 14px;cursor:pointer;transition:all .15s;display:inline-flex;align-items:center;gap:5px}
.btn-secondary:hover{background:var(--surface3);border-color:var(--border2)}

/* Footer */
.page-footer{margin-top:24px;text-align:center;font-size:11px;color:var(--text3)}
.page-footer a{color:var(--text3);text-decoration:none}
.page-footer a:hover{color:var(--text2)}

@media(max-width:540px){
  .portal-header,.search-wrap,.result-wrap{padding-left:20px;padding-right:20px}
  .status-cards-row{grid-template-columns:repeat(3,1fr)}
  .search-row{flex-direction:column}
  .btn-search{justify-content:center}
}
</style>

<script type="module">

import{getAuth,signInAnonymously,onAuthStateChanged}from'https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js';

const firebaseConfig={
  apiKey:"AIzaSyBLSp0en7wDD_71PF1n3qYXPF0YNTEWmIc",
  authDomain:"auftrage-edc6d.firebaseapp.com",
  projectId:"auftrage-edc6d",
  storageBucket:"auftrage-edc6d.firebasestorage.app",
  messagingSenderId:"675308449934",
  appId:"1:675308449934:web:b4c1fc2e190647ace419df"
};

try{
  const app=getApps().length?getApps()[0]:initializeApp(firebaseConfig);
  window.db=getFirestore(app);
  window._fsStorage=getStorage(app);
  window._fsDoc=doc;

  window._fsGetDocs=getDocs;
  window._fsRef=ref;
  window._fsGetDownloadURL=getDownloadURL;

  const auth=getAuth(app);

}catch(e){

// Auto-load from URL param

<script>
function escHtml(s){
  if(s==null)return'';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

// State for active order (used by muster approve/rework buttons)
let _activeOrderId=null;

async function loadMusterImageUrl(storagePath){
  if(!storagePath||!window._fsStorage||!window._fsRef||!window._fsGetDownloadURL)return null;
  try{
    return await window._fsGetDownloadURL(window._fsRef(window._fsStorage,storagePath));
  }catch(e){console.warn('Muster image URL:',e);return null;}
}

async function renderMusterBlock(order){
  const m=order&&order.muster?order.muster:null;
  if(!m||!m.storagePath)return ''; // no muster — skip section entirely

  _activeOrderId=order.id;
  const url=await loadMusterImageUrl(m.storagePath);
  const imgHtml=url
    ?`<div class="muster-img-wrap" onclick="window.open('${url}','_blank')"><img src="${url}" alt="1. Muster"></div>`
    :`<div style="padding:32px;text-align:center;color:var(--text3);background:var(--surface2);border-radius:12px;margin-bottom:12px;border:1px solid var(--border)">⏳ Muster-Bild wird geladen…</div>`;

  if(m.status==='approved'){
    const d=m.approvedAt?new Date(m.approvedAt).toLocaleString('de',{day:'2-digit',month:'long',year:'numeric',hour:'2-digit',minute:'2-digit'}):'';
    return `<div class="muster-block approved">
      <div class="muster-title muster-title-approved">✅ 1. Muster · Freigabe</div>
      ${imgHtml}
      <div class="muster-confirmed">
        <div class="muster-confirmed-icon">✅</div>
        <div class="muster-confirmed-text">
          <strong>Sie haben das Muster freigegeben.</strong>
          Bestätigt am ${d}. Die Produktion läuft entsprechend dem freigegebenen Muster.
        </div>
      </div>
    </div>`;
  }

  if(m.status==='rework'){
    const d=m.feedbackAt?new Date(m.feedbackAt).toLocaleString('de',{day:'2-digit',month:'long',year:'numeric',hour:'2-digit',minute:'2-digit'}):'';
    return `<div class="muster-block rework">
      <div class="muster-title muster-title-rework">⚠ 1. Muster · Änderung angefordert</div>
      ${imgHtml}
      <div class="muster-rework-info">
        <div class="muster-rework-info-title">⏳ Wir bearbeiten Ihre Anmerkungen</div>
        <div style="font-size:12px;color:var(--text2);line-height:1.5">Ihre Rückmeldung vom ${d} wurde an Wolf Lasermark übermittelt. Sie erhalten ein neues Muster, sobald die Anpassungen umgesetzt sind.</div>
        ${m.feedbackNote?`<div class="muster-rework-note">"${escHtml(m.feedbackNote)}"</div>`:''}
      </div>
    </div>`;
  }

  // status === 'pending' — needs customer action
  return `<div class="muster-block">
    <div class="muster-title muster-title-pending">📸 1. Muster · Ihre Freigabe nötig</div>
    <div class="muster-headline">Bitte prüfen Sie das erste Muster.</div>
    <div class="muster-sub">Wir haben ein Muster-Foto für Ihren Auftrag erstellt. Bitte bestätigen Sie die Beschriftung — oder teilen Sie uns Änderungswünsche mit, bevor wir die Serie produzieren. So vermeiden wir Missverständnisse.</div>
    ${imgHtml}
    <div class="muster-actions">
      <button class="btn-muster btn-muster-approve" onclick="approveMuster()">✅ Muster freigeben</button>
      <button class="btn-muster btn-muster-rework" onclick="openMusterRework()">✏ Änderung anfordern</button>
    </div>
    <div class="muster-feedback-form" id="muster-fb-form">
      <textarea id="muster-fb-text" placeholder="Was soll geändert werden? (z.B. Schriftgröße, Position, Tiefe…)" maxlength="800"></textarea>
      <div class="muster-fb-row">
        <button class="muster-fb-cancel" onclick="closeMusterRework()">Abbrechen</button>
        <button class="muster-fb-send" onclick="sendMusterRework()">Änderungswunsch senden</button>
      </div>
    </div>
  </div>`;
}

async function approveMuster(){
  if(!_activeOrderId)return;
  if(!confirm('Möchten Sie das Muster jetzt verbindlich freigeben? Die Produktion wird mit dieser Beschriftung fortgesetzt.'))return;
  const btns=document.querySelectorAll('.muster-actions button');
  btns.forEach(b=>{b.disabled=true;b.style.opacity='.5';});

  try{
    const ts=new Date().toISOString();
    await window._fsUpdateDoc(window._fsDoc(window.db,'orders',_activeOrderId),{
      'muster.status':'approved',
      'muster.approvedAt':ts,
      'muster.feedbackNote':null,
      'muster.feedbackAt':null,
      updatedAt:ts
    });
    // Re-render result
    document.getElementById('status-id-input').value=_activeOrderId;
    await lookupStatus();
    setTimeout(()=>{
      const blk=document.querySelector('.muster-block');
      if(blk)blk.scrollIntoView({behavior:'smooth',block:'center'});
    },200);
  }catch(e){
    console.error(e);
    alert('Fehler beim Senden: '+(e.message||'Unbekannt')+'\nBitte erneut versuchen oder per E-Mail an info@wolf-lasermark.de melden.');
    btns.forEach(b=>{b.disabled=false;b.style.opacity='1';});
  }
}

function openMusterRework(){
  const f=document.getElementById('muster-fb-form');
  if(f){f.classList.add('active');setTimeout(()=>document.getElementById('muster-fb-text').focus(),150);}
}
function closeMusterRework(){
  const f=document.getElementById('muster-fb-form');
  if(f)f.classList.remove('active');
}

async function sendMusterRework(){
  if(!_activeOrderId)return;
  const note=(document.getElementById('muster-fb-text').value||'').trim();
  if(!note){alert('Bitte beschreiben Sie kurz, was geändert werden soll.');return;}
  const btn=document.querySelector('.muster-fb-send');
  btn.disabled=true;btn.textContent='Wird gesendet…';
  try{
    const ts=new Date().toISOString();
    await window._fsUpdateDoc(window._fsDoc(window.db,'orders',_activeOrderId),{
      'muster.status':'rework',
      'muster.feedbackNote':note,
      'muster.feedbackAt':ts,
      'muster.approvedAt':null,
      updatedAt:ts
    });
    document.getElementById('status-id-input').value=_activeOrderId;
    await lookupStatus();
  }catch(e){
    console.error(e);
    alert('Fehler beim Senden: '+(e.message||'Unbekannt')+'\nBitte per E-Mail an info@wolf-lasermark.de.');
    btn.disabled=false;btn.textContent='Änderungswunsch senden';
  }
}

async function lookupStatus(){
  const R=54, C=2*Math.PI*R;
  const id=document.getElementById('status-id-input').value.trim().toUpperCase();
  const res=document.getElementById('status-result');
  const btn=document.getElementById('btn-search');

  res.style.display='block';

  if(!id){
    res.innerHTML='<div style="color:var(--text3);text-align:center;padding:20px">Bitte Auftragsnummer eingeben.</div>';
    return;
  }

  // Loading state
  btn.disabled=true;
  res.innerHTML='<div style="text-align:center;padding:36px;color:var(--text2)"><div style="font-size:32px;margin-bottom:12px">⏳</div>Auftrag wird geladen…</div>';

  let order=null;

  // Load from Firestore — no login required (public read via Firestore Rules)
  if(window.db && window._fsGetDoc){
    try{
      const snap=await window._fsGetDoc(window._fsDoc(window.db,'orders',id));
      if(snap.exists()){
        order=snap.data();
        // Load serials subcollection for progress stats
        const serialSnap=await window._fsGetDocs(window._fsCollection(window.db,'orders',id,'serials'));
        order._serials=serialSnap.docs.map(d=>d.data());
      }
    }catch(e){
      console.error('Firestore error:',e);
      res.innerHTML=`<div class="not-found">
        <div class="not-found-icon">⚠️</div>
        <div style="font-weight:700;margin-bottom:4px">Verbindungsfehler</div>
        <div style="font-size:12px;color:var(--text3)">${escHtml(e.message||'Bitte Seite neu laden.')}</div>
      </div>`;
      btn.disabled=false;
      return;
    }
  } else {
    res.innerHTML='<div class="not-found"><div class="not-found-icon">⚠️</div><div style="font-weight:700">Firebase nicht verfügbar</div><div style="font-size:12px;color:var(--text3)">Bitte Seite neu laden.</div></div>';
    btn.disabled=false;
    return;
  }

  btn.disabled=false;

  if(!order){
    res.innerHTML=`<div class="not-found">
      <div class="not-found-icon">🔍</div>
      <div style="font-weight:700;margin-bottom:6px">Auftrag nicht gefunden</div>
      <div style="font-size:12px;color:var(--text3)">Keine Auftrags-Nr. „${escHtml(id)}" im System.<br>Bitte Schreibweise prüfen (Groß-/Kleinschreibung).</div>
    </div>`;
    return;
  }

  // Render result
  const dn=order._serials?order._serials.filter(s=>s.state==='done').length:0;
  const rw=order._serials?order._serials.filter(s=>s.state==='rework').length:0;
  const sc=order._serials?order._serials.filter(s=>s.state==='scrap').length:0;
  const pct=order.qty?Math.round(dn/order.qty*100):0;

  const createdDate=order.createdAt?new Date(order.createdAt):null;

  // ETA box
  let etaHtml='';
  if(order.status==='done'){
    etaHtml=`<div class="eta-box"><div class="eta-icon">✅</div><div>
      <div class="eta-label">Abgeschlossen</div>
      <div class="eta-val">Ihr Auftrag ist fertig!</div>
      <div class="eta-sub">Alle ${dn} Teile beschriftet und freigegeben.</div>
    </div></div>`;
  } else if(order.status==='in_progress'){
    const rem=order.qty-dn;
    etaHtml=`<div class="eta-box"><div class="eta-icon">⚙️</div><div>
      <div class="eta-label">In Bearbeitung</div>
      <div class="eta-val">Noch ${rem} von ${order.qty} Teilen offen</div>
      <div class="eta-sub">Wir arbeiten an Ihrem Auftrag. Bei Fragen: <a href="mailto:info@wolf-lasermark.de" style="color:var(--accent2)">info@wolf-lasermark.de</a></div>
    </div></div>`;
  } else {
    etaHtml=`<div class="eta-box"><div class="eta-icon">📥</div><div>
      <div class="eta-label">Auftrag eingegangen</div>
      <div class="eta-val">In Warteschlange</div>
      <div class="eta-sub">Ihr Auftrag wird bald bearbeitet. Eingang: ${createdDate?createdDate.toLocaleDateString('de',{day:'2-digit',month:'long',year:'numeric'}):''}</div>
    </div></div>`;
  }

  // Muster section (1. Muster zur Freigabe)
  const musterHtml=await renderMusterBlock(order);

  // Timeline
  const steps=[
    {label:'Auftrag eingegangen',icon:'📥',sub:'Wir haben Ihren Auftrag erhalten und geprüft.'},
    {label:'In Bearbeitung',icon:'⚡',sub:`Laserbeschriftung läuft. ${pct}% abgeschlossen.`},
    {label:'Fertig & freigegeben',icon:'✅',sub:'Alle Seriennummern beschriftet und qualitätskontrolliert.'}
  ];
  const statusOrder=['received','in_progress','done'];
  const ci=statusOrder.indexOf(order.status);
  const timelineHtml=steps.map((s,i)=>{
    const cls=i<ci?'done':i===ci?'active':'';
    return`<div class="stl-item ${cls}">
      <div class="stl-dot ${cls}">${s.icon}</div>
      <div class="stl-content">
        <div class="stl-title">${s.label}</div>
        <div class="stl-sub">${i===1&&order.status==='in_progress'?s.sub:(i<ci?'Abgeschlossen':i===ci?s.sub:'Ausstehend')}</div>
      </div>
    </div>`;
  }).join('');

  // Progress ring (only when in_progress or done)
  const ringColor=pct===100?'var(--ok)':pct>50?'var(--accent2)':'var(--accent)';
  const ringHtml=order.status!=='received'?`
    <div class="progress-ring-wrap">
      <svg width="130" height="130" viewBox="0 0 130 130">
        <circle class="progress-ring-bg" cx="65" cy="65" r="${R}" transform="rotate(-90 65 65)"/>
        <circle class="progress-ring-fill" cx="65" cy="65" r="${R}"
          stroke="${ringColor}" stroke-dasharray="${C}" stroke-dashoffset="${C}"
          id="ring-fill-circle" transform="rotate(-90 65 65)"/>
        <text class="progress-ring-label" x="65" y="60" font-size="24" fill="var(--text)">${pct}%</text>
        <text class="progress-ring-label" x="65" y="78" font-size="10" fill="var(--text3)">Fortschritt</text>
      </svg>
    </div>`:'';

  res.innerHTML=`
    <div class="status-hero">
      <div style="display:flex;justify-content:center;margin-bottom:10px">
        <div class="live-dot">Live-Status</div>
      </div>
      <div class="status-hero-id">${escHtml(order.id)}</div>
      <div class="status-hero-name">${escHtml(order.projectName)}</div>
      <div class="status-hero-meta">
        <span>🏭 ${escHtml(order.companyName)}</span>
        <span>🔩 ${escHtml(order.material)}</span>
        <span>📦 ${order.qty} Stück</span>
      </div>
    </div>
    ${ringHtml}
    ${order.status!=='received'?`<div class="status-cards-row">
      <div class="sc-card"><div class="sc-val" style="color:var(--ok)">${dn}</div><div class="sc-label">✓ Fertig</div></div>
      <div class="sc-card"><div class="sc-val" style="color:var(--warn)">${rw}</div><div class="sc-label">⚠ Rework</div></div>
      <div class="sc-card"><div class="sc-val" style="color:var(--danger)">${sc}</div><div class="sc-label">✕ Ausschuss</div></div>
    </div>`:''}
    ${musterHtml}
    ${etaHtml}
    <div style="border-top:1px solid var(--border);margin-top:4px;padding-top:16px">
      <div style="font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--text3);margin-bottom:12px">Auftragsverlauf</div>
      <div class="status-timeline">${timelineHtml}</div>
    </div>
    ${order.notes?`<div style="margin-top:14px;padding:12px 14px;background:var(--surface2);border-radius:10px;font-size:12px;color:var(--text2);border:1px solid var(--border)">
      <strong style="color:var(--text);display:block;margin-bottom:4px">📝 Ihre Notiz</strong>${escHtml(order.notes)}
    </div>`:''}
    <div style="margin-top:16px">
      <button class="btn-secondary" onclick="document.getElementById('status-result').style.display='none';document.getElementById('status-id-input').value=''">← Neue Suche</button>
    </div>`;

  // Animate progress ring
  requestAnimationFrame(()=>requestAnimationFrame(()=>{
    const circle=document.getElementById('ring-fill-circle');
    if(circle) circle.style.strokeDashoffset=C*(1-pct/100);
  }));
}
</script>

<script type="module" src="analytics.js"></script>
